<svg width="100%" viewBox="0 0 680 240" role="img" xmlns="http://www.w3.org/2000/svg">
<title>FloodTraces logo animation</title>
<desc>A dot moves along a path, is displaced by a flood event with rising water and rain, moves to a new location, then returns home.</desc>
<defs>
  <style>
    @keyframes rain1{0%,36%,58%,100%{opacity:0;transform:translateY(0)}40%{opacity:0.8;transform:translateY(0)}52%{opacity:0.8;transform:translateY(32px)}55%{opacity:0;transform:translateY(36px)}}
    @keyframes rain2{0%,37%,59%,100%{opacity:0;transform:translateY(0)}41%{opacity:0.7;transform:translateY(0)}53%{opacity:0.7;transform:translateY(28px)}56%{opacity:0;transform:translateY(32px)}}
    @keyframes rain3{0%,38%,60%,100%{opacity:0;transform:translateY(0)}42%{opacity:0.6;transform:translateY(0)}54%{opacity:0.6;transform:translateY(34px)}57%{opacity:0;transform:translateY(38px)}}
    @keyframes rain4{0%,36%,58%,100%{opacity:0;transform:translateY(0)}39%{opacity:0.75;transform:translateY(0)}51%{opacity:0.75;transform:translateY(30px)}54%{opacity:0;transform:translateY(34px)}}
    @keyframes rain5{0%,37%,59%,100%{opacity:0;transform:translateY(0)}40%{opacity:0.65;transform:translateY(0)}52%{opacity:0.65;transform:translateY(26px)}55%{opacity:0;transform:translateY(30px)}}
    @keyframes rain6{0%,38%,60%,100%{opacity:0;transform:translateY(0)}42%{opacity:0.7;transform:translateY(0)}51%{opacity:0.7;transform:translateY(30px)}54%{opacity:0;transform:translateY(34px)}}
    @keyframes rain7{0%,36%,58%,100%{opacity:0;transform:translateY(0)}40%{opacity:0.55;transform:translateY(0)}50%{opacity:0.55;transform:translateY(24px)}53%{opacity:0;transform:translateY(28px)}}
    @keyframes floodBody{0%,34%,68%,100%{opacity:0;transform:scaleY(0);transform-origin:bottom}42%{opacity:0.55;transform:scaleY(0.3);transform-origin:bottom}50%{opacity:0.6;transform:scaleY(1);transform-origin:bottom}58%{opacity:0.6;transform:scaleY(1);transform-origin:bottom}64%{opacity:0;transform:scaleY(0.1);transform-origin:bottom}}
    @keyframes floodWave{0%,34%,68%,100%{opacity:0}42%,62%{opacity:0.9}50%,56%{opacity:1}66%{opacity:0}}
    @keyframes dotMove{0%{transform:translate(80px,130px)}28%{transform:translate(280px,130px)}44%{transform:translate(320px,130px)}59%{transform:translate(400px,175px)}73%{transform:translate(460px,175px)}88%{transform:translate(560px,130px)}100%{transform:translate(80px,130px)}}
    @keyframes dotStyle{0%,28%{fill:#2d5e3f;r:8}42%{fill:#2d5e3f;r:8}50%{fill:#1a3a2a;r:5}60%{fill:#3d7a52;r:7}76%{fill:#3d7a52;r:7}90%{fill:#2d5e3f;r:8}100%{fill:#2d5e3f;r:8}}
    @keyframes traceA{0%{stroke-dashoffset:450;opacity:0}4%{opacity:0.5}26%{stroke-dashoffset:0;opacity:0.45}40%{stroke-dashoffset:0;opacity:0.08}100%{stroke-dashoffset:0;opacity:0}}
    @keyframes traceB{0%,43%{stroke-dashoffset:280;opacity:0}49%{opacity:0.45}70%{stroke-dashoffset:0;opacity:0.4}84%{stroke-dashoffset:0;opacity:0.08}100%{stroke-dashoffset:0;opacity:0}}
    @keyframes traceC{0%,70%{stroke-dashoffset:240;opacity:0}78%{opacity:0.35}94%{stroke-dashoffset:0;opacity:0.3}100%{stroke-dashoffset:0;opacity:0}}
    @keyframes homePulse{0%,90%,100%{opacity:0;r:14}93%{opacity:0.4;r:14}98%{opacity:0;r:30}}
    @keyframes dispPulse{0%,59%,80%,100%{opacity:0;r:11}62%{opacity:0.35;r:11}70%{opacity:0;r:24}}
    @keyframes eventBurst{0%,38%,56%,100%{opacity:0;r:6}41%{opacity:0.7;r:6}48%{opacity:0.25;r:42}53%{opacity:0;r:54}}
  </style>
  <clipPath id="floodClip">
    <rect x="250" y="60" width="160" height="140"/>
  </clipPath>
</defs>
<path d="M80,130 L560,130" fill="none" stroke="#c8dece" stroke-width="1" stroke-dasharray="4 6"/>
<path d="M320,130 Q355,130 400,175 L460,175" fill="none" stroke="#8ab89a" stroke-width="0.8" stroke-dasharray="3 5"/>
<path d="M460,175 Q510,175 560,130" fill="none" stroke="#8ab89a" stroke-width="0.8" stroke-dasharray="3 5"/>
<path d="M80,130 L280,130" fill="none" stroke="#2d5e3f" stroke-width="2" stroke-dasharray="450" style="animation:traceA 9s ease-in-out infinite;"/>
<path d="M320,130 Q355,130 400,175 L460,175" fill="none" stroke="#3d7a52" stroke-width="2" stroke-dasharray="280" style="animation:traceB 9s ease-in-out infinite;"/>
<path d="M460,175 Q510,175 560,130" fill="none" stroke="#2d5e3f" stroke-width="2" stroke-dasharray="240" style="animation:traceC 9s ease-in-out infinite;"/>
<g clip-path="url(#floodClip)">
  <rect x="250" y="100" width="160" height="100" fill="#4a8c63" rx="18" ry="12" style="animation:floodBody 9s ease-in-out infinite;" opacity="0"/>
  <ellipse cx="280" cy="100" rx="14" ry="6" fill="#2d5e3f" style="animation:floodWave 9s ease-in-out infinite;" opacity="0"/>
  <ellipse cx="320" cy="98" rx="18" ry="7" fill="#2d5e3f" style="animation:floodWave 9s 0.1s ease-in-out infinite;" opacity="0"/>
  <ellipse cx="362" cy="100" rx="16" ry="6" fill="#2d5e3f" style="animation:floodWave 9s 0.05s ease-in-out infinite;" opacity="0"/>
  <ellipse cx="398" cy="99" rx="12" ry="5" fill="#2d5e3f" style="animation:floodWave 9s 0.15s ease-in-out infinite;" opacity="0"/>
</g>
<line x1="271" y1="52" x2="265" y2="82" stroke="#8ab89a" stroke-width="1.5" stroke-linecap="round" style="animation:rain1 9s ease-in-out infinite;" opacity="0"/>
<line x1="289" y1="44" x2="283" y2="74" stroke="#8ab89a" stroke-width="1.5" stroke-linecap="round" style="animation:rain2 9s ease-in-out infinite;" opacity="0"/>
<line x1="307" y1="40" x2="301" y2="70" stroke="#8ab89a" stroke-width="1.5" stroke-linecap="round" style="animation:rain3 9s ease-in-out infinite;" opacity="0"/>
<line x1="325" y1="36" x2="319" y2="66" stroke="#8ab89a" stroke-width="1.5" stroke-linecap="round" style="animation:rain4 9s ease-in-out infinite;" opacity="0"/>
<line x1="343" y1="40" x2="337" y2="70" stroke="#8ab89a" stroke-width="1.5" stroke-linecap="round" style="animation:rain2 9s 0.1s ease-in-out infinite;" opacity="0"/>
<line x1="361" y1="44" x2="355" y2="74" stroke="#8ab89a" stroke-width="1.5" stroke-linecap="round" style="animation:rain5 9s ease-in-out infinite;" opacity="0"/>
<line x1="379" y1="50" x2="373" y2="80" stroke="#8ab89a" stroke-width="1.5" stroke-linecap="round" style="animation:rain6 9s ease-in-out infinite;" opacity="0"/>
<line x1="280" y1="58" x2="274" y2="84" stroke="#4a8c63" stroke-width="1" stroke-linecap="round" style="animation:rain7 9s 0.12s ease-in-out infinite;" opacity="0"/>
<line x1="316" y1="52" x2="310" y2="78" stroke="#4a8c63" stroke-width="1" stroke-linecap="round" style="animation:rain3 9s 0.18s ease-in-out infinite;" opacity="0"/>
<line x1="352" y1="56" x2="346" y2="82" stroke="#4a8c63" stroke-width="1" stroke-linecap="round" style="animation:rain1 9s 0.08s ease-in-out infinite;" opacity="0"/>
<circle cx="0" cy="0" fill="none" stroke="#1a3a2a" stroke-width="1.5" r="6" style="animation:eventBurst 9s ease-out infinite;" opacity="0"/>
<circle cx="80" cy="130" r="20" fill="none" stroke="#2d5e3f" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.2"/>
<circle cx="80" cy="130" r="12" fill="none" stroke="#2d5e3f" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.25"/>
<circle cx="0" cy="0" fill="none" stroke="#2d5e3f" stroke-width="1.2" r="14" style="animation:homePulse 9s ease-out infinite;" opacity="0"/>
<circle cx="460" cy="175" r="10" fill="none" stroke="#3d7a52" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.2"/>
<circle cx="0" cy="0" fill="none" stroke="#3d7a52" stroke-width="1" r="11" style="animation:dispPulse 9s ease-out infinite;" opacity="0"/>
<g style="animation:dotMove 9s cubic-bezier(0.45,0,0.55,1) infinite;">
  <circle cx="0" cy="0" style="animation:dotStyle 9s ease-in-out infinite;"/>
</g>
</svg>
